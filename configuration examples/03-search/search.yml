# Denne fil bør ikke slettes eller redigeres
# Inkludér i config.yml og tag hvad du har brug for
search:
  dawa:
    _type: Septima.Search.DawaSearcher
    _options:
      minimumShowCount: 6
      kommunekode:
        _ref: $.parameters.kommunekode
      showOneStreet: true
  plansystem:
    _type: Septima.Search.PlanSystemSearcher
    _options:
      kommunekode:
        _ref: $.parameters.kommunekode
      minimumShowCount: 3
      targets:
        _ref: $.parameters.plansystem.targets
  cvr:
    _type: Septima.Search.DataApi.CvrSearcher
    _options:
      fetcher:
        _type: Septima.Search.DataApi.Fetcher
      kommunekode:
        _ref: $.parameters.kommunekode
  poi:
    _type: poi.Searcher
    _options:
      kommunekode:
        _ref: $.parameters.kommunekode
      hovedtyper:
        _ref: $.parameters.poi.hovedtyper
      undertyper:
        _ref: $.parameters.poi.undertyper
      fetcher:
        _type: poi.Fetcher
        _options:
          token:
            _ref: $.parameters.poi.token
  datafordelerfetcher:
    _type: datafordeler.Fetcher
    _options:
      username:
        _ref: $.parameters.datafordeler.username
      password:
        _ref: $.parameters.datafordeler.password
      passphrase:
        _ref: $.parameters.datafordeler.certifikat.passphrase
      certificateDir:
        _ref: $.parameters.datafordeler.certifikat.dir
      certificateFilename:
        _ref: $.parameters.datafordeler.certifikat.filename
  ejendomme:
    _type: Septima.Search.Datafordeler.EjendomsSearcher
    _options:
      fetcher:
        _ref: $.standardkommune.datafordelerfetcher
  bbr:
    _type: Septima.Search.Datafordeler.BbrSearcher
    _options:
      fetcher:
        _ref: $.standardkommune.datafordelerfetcher
      geosearcher:
        _ref: $.standardkommune.gsearch
  stednavne:
    _type: Septima.Search.GeoStednavnSearcher
    _options:
      kommunekode:
        _ref: $.parameters.kommunekode
  skoledistrikter:
    _type: Septima.Search.FkgSearcher
    _options:
      minimumShowCount: 3
      targets:
        - t_5710_born_skole_dis_t
      detailhandlers:
        - _type: "Septima.Search.FkgInfoProvider"
          _options:
            fields:
              - t_5710_born_skole_dis_t: [temanavn','udd_distrikt_navn','cvr_navn','cvr_kode','starttrin','slutttrin']
  kloakoplande:
    _type: Septima.Search.PlanSystemSearcher
    _options:
      targets: ['vedtagetkloakopland','mulighedforudtraedenkloakopland']
    detailhandlers:
      - _type: Septima.Search.PlanInfoProvider  
  gsearch:
    _type: Septima.Search.GeoSearch
    _options:
      targets:
        _ref: $.parameters.gsearch.targets
      kommunekode:
        _ref: $.parameters.kommunekode
  detailhandlers:
    poisForGeometryProvider:
      _type: poi.PoisForGeometryProvider
      _options:
        id: nearest
        buttonText: "Diverse Nærmeste med cykelafstand"
        poiSearcher:
          _ref: $.searchers.poi
        hovedtyper:
          _ref: $.parameters.poi.hovedtyper
        undertyper: ['*']
        per_type: 3
        per_side: 100
        fetcher:
          _type: poi.Fetcher
          _options:
            token:
              _ref: $.parameters.poi.token
      detailhandlers:
        - _type: Septima.Search.RouteProvider
          _options:
            fields: ["route.distance", "route.time","route.geometry"] ##"route.geometry" needs onedoor feature to render
            routeApiKey: septima-OO47AF6JEX
            routeProfile: "bicycle"

    EjdExplorerLinks:
      _type: Septima.Search.EjdExplorerLinks

    ejendomForHusnummerJordstykke:
      _type: Septima.Search.Datafordeler.EjendomForJordstykkeDawa
      _options:
        id: ejendom
        searcher:
          _ref: $.searchers.ejendomme
        medtagadresser: true
    bygningerForHusnummerJordstykke:
      _type: Septima.Search.Datafordeler.Bygninger
      _options:
        meta:
          type: labelvalue
          value: Denne fane viser bygninger, som overlapper resultatets geometri. Bemærk nogle bygninger findes ikke i Geodanmark og vises derfor som punkt

        id: bygning    
        searcher:
          _ref: $.searchers.bbr
    boligerForHusnummer:
      _type: Septima.Search.Datafordeler.BoligerForHusnummerProvider
      _options:
        fetcher:
          _ref: $.standardkommune.datafordelerfetcher
    cvrRegistreringerForHusnummer:
      _type: Septima.Search.DataApi.CvrRegistreringerForHusnummer
      _options:
        cvrSearcher:
          _ref: $.searchers.cvr
    sqCvrRegistreringer:
      _type: s3.SqDetailsHandler
      _options:
        id: cvr
        polygonIntersectsBuffer: -1
        buttonText: CVR
        noResultsListItem:
          type: labelvalue
          label: CVR-registreringer
          value: Ingen CVR-registreringer fundet
      searchers:
        - _ref: $.searchers.ejendomme
    sqBygninger:
      _type: s3.SqDetailsHandler
      _options:
        meta:
          type: labelvalue
          value: På denne fane vises bygninger, som overlapper resultatets geometri. Bemærk nogle bygninger findes ikke i Geodanmark og vises derfor som punkt
        id: bygning
        polygonIntersectsBuffer: -1
        buttonText: Bygninger
        noResultsListItem:
          type: labelvalue
          label: Ejendomme
          value: Ingen bygninger fundet
      searchers:
        - _ref: $.searchers.bbr
    sqEjendomme:
      _type: s3.SqDetailsHandler
      _options:
        id: ejendom
        polygonIntersectsBuffer: -1
        buttonText: Ejendom
        noResultsListItem:
          type: labelvalue
          label: Ejendomme
          value: Ingen ejendomme fundet
      searchers:
        - _ref: $.searchers.ejendomme
    sqLokalPlaner:
      _type: s3.SqDetailsHandler
      _options:
        id: lokalplaner
        polygonIntersectsBuffer: -1
        buttonText: Lokalplaner
        noResultsListItem:
          type: labelvalue
          label: Lokalplaner
          value: Ingen lokalplaner fundet
      searchers:
        - _ref: $.searchers.plansystem
          _options:
            targets:
              - vedtagetlokalplan
    sqPlaner:
      _type: s3.SqDetailsHandler
      _options:
        id: planerMedBuffer
        polygonIntersectsBuffer: -1
        buttonText: Planer
        meta:
          type: labelvalue
          value: "Denne fane viser planer, som overlapper resultatets geometri (fratrukket 1 meter for at undgå små overlap pga unøjagtigheder i digitalisering)."
        noResultsListItem:
          type: labelvalue
          label: Planer
          value: Ingen planer fundet
      searchers:
        - _ref: $.searchers.plansystem
      detailhandlers:
        - _type: Septima.Search.PlanInfoProvider
          _options:
            fields:
              lp: [ 'doklink', 'datovedt', 'datoforsl']
              lpf: [ 'doklink', 'datoforsl']
              kpl: ['plannr','datovedt', 'datoforsl']
              kpt: ['plannr','datovedt', 'datoforsl']
              ko: ['staar1201', 'sluaar1201', 'datoforsl', 'datovedt', 'datoikraft']
    sqJordstykker:
      _type: s3.SqDetailsHandler
      _options:
        id: jordstykker
        buttonText: Jordstykker
        meta:
          type: labelvalue
          value: Denne fane viser jordstykker, som overlapper resultatets geometri
        noResultsListItem:
          type: labelvalue
          label: Der er ikke fundet nogen jordstykker
      searchers:
        - _ref: $.searchers.gsearch
          _options:
            targets:
              - matrikelnumre
    sqSkoledistrikter:
      _type: Septima.Search.SqDetailsHandler
      searchers:
        - _ref: $.standardkommune.skoledistrikter
          _options:
            meta:
              type: labelvalue
              value: Denne fane viser skoledistrikter fra GeoFa databasen, som overlapper resultatets geometri
            noResultsListItem:
             type: labelvalue
             label: Ingen skoledistrikter fundet   
    sqKloakoplande:
        _type: Septima.Search.SqDetailsHandler
        _options:
          targets: [{source: '*', typeId: 'vedtagetlokalplan'}]
          meta:
            type: labelvalue
            value: Denne fane viser kloakoplande fra Plandata, som overlapper resultatets geometri
          buttonText: Spildevandsplan
        searchers:
          - _ref: $.standardkommune.kloakoplande
    bbrInfoOgSager:
      _type: Septima.Search.ComposedDetailsHandler
      _options:
        meta:
          type: labelvalue
          value: Denne fane viser BBR-oplysninger og sager, som har relation til resultatet
        buttonText: BBR-information
        id: bbr
      detailhandlers:
        - _ref: $.standardkommune.detailhandlers.bbrInfo        
    bbrEnhedInfo:
      _ref: $.standardkommune.detailhandlers.bbrInfo
    bbrInfo:
      _type: Septima.Search.Datafordeler.BbrInfo
      _options:
        fetcher:
          _ref: $.standardkommune.datafordelerfetcher
    bbrsager:
      _type: Septima.Search.Datafordeler.BbrSagProvider
      _options:
        fetcher:
          _ref: $.standardkommune.datafordelerfetcher
        bbrsearcher:
          _ref: $.standardkommune.bbr
    dagiInfo:
      _type: Septima.Search.DagiInfoProvider
      _options:
        meta:
          type: labelvalue
          value: Denne fane viser administrative inddelinger, som overlapper resultatets geometri
        id: dagi
        buttonText: Administrativ inddeling
        fields:
          _ref: $.parameters.dagiInfo.fields
        geoSearcher:
          _ref: $.searchers.gsearch
    offentligeLinksForAdresseJordstykke:
      _type: Septima.Search.OffentligeLinksForAdresseMatrikel
      _options:
        id: offentligelinks
        meta:
          type: labelvalue
          value: Denne fane viser udvalgte links til offentlige data, som er relevante for resulatet
        buttonText: Offentlige links
        links:
          _ref: $.parameters.offentligeLinksForAdresseJordstykke.links

    planInfo:
      _type: Septima.Search.PlanInfoProvider
      _options:
        fields:
          _ref: $.parameters.planInfo.fields
    sqHusnumre:
      _type: s3.SqDetailsHandler
      _options:
        meta:
          type: labelvalue
          value: Her bruger vi datafordelerens wfs til at finde husnumre indenfor resultatets geometri
        id: husnummer
        buttonText: Husnumre
        noResultsListItem:
          type: labelvalue
          label: Der er ikke fundet nogen adresser
      searchers:
        - _ref: $.searchers.dawa
    omEjendommen:
      _type: Septima.Search.Datafordeler.EjendomsInfoProvider
      _options:
        id: omejendom
        meta:
          type: labelvalue
          value: Dette er udvalgte oplysninger om ejendommen
        showHistory: false
        buttonImage: 'data:image/svg+xml;base64, PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHhtbG5zOnhsaW5rPSJodHRwOi8vd3d3LnczLm9yZy8xOTk5L3hsaW5rIiB2ZXJzaW9uPSIxLjEiIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0Ij48cGF0aCBkPSJNNSwxNy41OUwxNS41OSw3SDlWNUgxOVYxNUgxN1Y4LjQxTDYuNDEsMTlMNSwxNy41OVoiIC8+PC9zdmc+'
        ejerAnon: false
        showBeskyttelse: true
        searcher:
          _ref: $.searchers.ejendomme
        bygningsSearcher:
          _ref: $.searchers.bbr
        dawasearcher:
          _ref: $.searchers.dawa
    historiskeEjere:
      _type: datafordeler.EjendomsInfoProvider
      _options:
        sections: ["bfe_ejere"]
        id: ejere_historisk
        meta:
          type: labelvalue
          value: Dette er ejendommens historiske ejere. Bemærk, at status "historisk" er en tidligere ejer.
        buttonText: Ejerskab historisk
        showHistory: true
        buttonImage: 'data:image/svg+xml;base64, PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHhtbG5zOnhsaW5rPSJodHRwOi8vd3d3LnczLm9yZy8xOTk5L3hsaW5rIiB2ZXJzaW9uPSIxLjEiIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0Ij48cGF0aCBkPSJNNSwxNy41OUwxNS41OSw3SDlWNUgxOVYxNUgxN1Y4LjQxTDYuNDEsMTlMNSwxNy41OVoiIC8+PC9zdmc+'
        ejerAnon: false
        showBeskyttelse: true
        searcher:
          _ref: $.searchers.ejendomme
    offentligelinksForEjendom:
      _type: datafordeler.OffentligeLinks
      _options:
        id: offentligelinks
        links: ["jfa","bbrmeddelelse","boligejer.dk","vurdering","bbkort","ois", "skraafoto_dataforsyningen", "plankort", "matriklen.dk_bfe"]
      
            
    

    skraafoto:
      _type: Septima.Search.ComposedDetailsHandler
      _options:
        buttonText: Skråfoto
        id: skraafoto
      detailhandlers:
        - _type: Septima.Search.Details
          _options:
            details: 
              - type: link
                linkTitle: skråfoto.dataforsyningen.dk
                link: https://skraafoto.dataforsyningen.dk/?center={$.geometry.coordinates[0]},{$.geometry.coordinates[1]}
        - _type: Septima.Search.SkraafotoProvider
          _options:
            id: skraafoto
            header: SDFE skråfotos
            token:
              _ref: $.parameters.skraafoto.token   
    omHusnummeret:
      _type: Septima.Search.ComposedDetailsHandler
      _options:
        targets: [{source: '*', typeId: 'adresse'}]
        id: omhusnummer
        more: true
        meta:
          type: labelvalue
          value: Dette er en beskrivelse af hvad denne fane indeholder
        buttonText: 'Om husnummeret'
        buttonImage: 'data:image/svg+xml;base64, PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHhtbG5zOnhsaW5rPSJodHRwOi8vd3d3LnczLm9yZy8xOTk5L3hsaW5rIiB2ZXJzaW9uPSIxLjEiIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0Ij48cGF0aCBkPSJNNSwxNy41OUwxNS41OSw3SDlWNUgxOVYxNUgxN1Y4LjQxTDYuNDEsMTlMNSwxNy41OVoiIC8+PC9zdmc+'
      detailhandlers:
        - _ref: $.search.detailhandlers.filarkiv
        - _type: Septima.Search.HusnummerInfoProvider
          _options:
            geosearcher:
              _ref: $.searchers.gsearch
            fields:
              - postadresse
              - antaladdresser
              - matrikelnr
            meta:
              type: labelvalue
              value: Husnummer-info fra Dawa
        - _type: Septima.Search.Datafordeler.EjendomForJordstykkeDawa
          _options:
            id: ejendom
            searcher:
              _ref: $.searchers.ejendomme
            medtagadresser: true
            meta:
              type: labelvalue
              value: Dette er den ejendom, der er registreret på jordstykker. Fra Datafordeleren (ejendomsbeliggenhedsregistret)
        - _ref: $.search.detailhandlers.bygningerForHusnummerJordstykke
        - _ref: $.search.detailhandlers.boligerForHusnummer
        - _ref: $.search.detailhandlers.cvrRegistreringerForHusnummer
        - _ref: $.search.detailhandlers.sqLokalPlaner
        - _ref: $.search.detailhandlers.sqKloakoplande
        - _ref: $.search.detailhandlers.sqSkoledistrikter
        - _type: Septima.Search.HusnummerInfoProvider
          _options:
            geosearcher:
              _ref: $.searchers.gsearch
            buttonText: Koder
            fields:
              - id
              - kode
        - _ref: $.search.detailhandlers.EjdExplorerLinks

    omVej:
      _type: Septima.Search.ComposedDetailsHandler
      _options:
        targets: [{source: 'Dawa', typeId: 'vej'}]
        id: omvej
        more: true
        meta:
          type: labelvalue
          value: Dette er oplysninger om vejen
        buttonText: 'Om vejen'
      detailhandlers:
        - _type: Septima.Search.Details
          _options:
            asList: false
            details:
              - type: labelvalue
                label: Vejkode
                value: $.properties.kode
              - type: labelvalue
                label: Navn
                value: $.properties.navn
              - type: labelvalue
                label: Adresseringsnavn
                value: $.properties.adresseringsnavn
    tilstoedendeEjendomme:
      _type: s3.SqDetailsHandler
      _options:
        meta:
          type: labelvalue
          value: Dette er tilstødende ejendomme, som overlapper vejens geometri med en buffer på 10 meter
        targets: [{source: 'Dawa', typeId: 'vej'}]
        #proxySearcher:
        #  _ref: $.searchers.jordstykke_proxy
        #showProxy: true
        id: ejendomme_close
      #polygonIntersectsBuffer: 150
        queryGeometryBuffer: 10
        buttonText: Tilstødende ejendomme
        noResultsListItem:
          type: labelvalue
          label: Ejendomme
          value: Ingen ejendomme fundet
      searchers:
        - _ref: $.searchers.ejendomme



    omJordstykket:
      _type: Septima.Search.ComposedDetailsHandler
      _options:
        id: omjordstykke
        more: true
        targets: [{source: '*', typeId: 'matrikelnumre'}]
        buttonText: 'Om jordstykket'
        buttonImage: 'data:image/svg+xml;base64, PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHhtbG5zOnhsaW5rPSJodHRwOi8vd3d3LnczLm9yZy8xOTk5L3hsaW5rIiB2ZXJzaW9uPSIxLjEiIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0Ij48cGF0aCBkPSJNNSwxNy41OUwxNS41OSw3SDlWNUgxOVYxNUgxN1Y4LjQxTDYuNDEsMTlMNSwxNy41OVoiIC8+PC9zdmc+'
        meta:
          type: labelvalue
          value: Dette er en beskrivelse af hvad denne fane indeholder
      detailhandlers:
        - _ref: $.search.detailhandlers.filarkiv
        - _type: Septima.Search.JordStykkeInfoProvider
          _options:          
            fields: ["ejendom","adminfo", 'landbrugsnotering', 'arealer', 'sekundaer']         
            ejdSearcher:  
              _ref: $.standardkommune.ejendomme
        - _type: datafordeler.SagsoplysningerForJordstykkeProvider
          _options:
            fetcher:
              _ref: $.standardkommune.datafordelerfetcher
        - _ref: $.search.detailhandlers.sqLokalPlaner
        - _ref: $.search.detailhandlers.sqKloakoplande
        - _ref: $.search.detailhandlers.EjdExplorerLinks
    cowiGadefoto:
      _type: Septima.Search.CowiGadefotoProvider
      _options:
        username: Silkeborg-Kommune
        password: z.GtvDo2.7Qp
        projectname: DDG Silkeborg Kommune
        projectid: 35a025fd-2e8b-4458-b05b-0db8bcb1fbb7

    filarkiv:
      _type: Septima.Search.FilarkivLinkForAdresseMatrikelHandler
      _options:
        kommunenavn: Silkeborg2
        kommunekode: 740
        usePublicSite: false
        showList: false