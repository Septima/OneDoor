guide:
  searchableData:
    _type: Septima.Search.SearchableData
    _options:
      data: 
       _ref: $.guide.entries
      singular: Hjælp
      plural: Hjælp
      searchProperties: ['title', 'description', 'text']
      displaynameProperty: 'title'
      descriptionProperty: 'description'
      idProperty: id
  guideSearcher:
    _type: Septima.Search.DataSearcher
    _options:
      searchableData:
        _ref: $.guide.searchableData
    detailhandlers:
      - _type: Septima.Search.Details
        _options:
          id: info
          renderHints:
            - "nomap"
          details:
            - type: labelvalue
              label: beskrivelse
              value: $.text
            - type: image
              Xlabel: 'Skærmbillede 1'
              value: $.link1
            - type: image
              Xlabel: 'Skærmbillede 2'
              value: $.link2  
  entries:
    - title: "Hvem ejer ejendommen ?"
      id: 1
      description: "Vejledning i, hvordan man finder frem til ejer af en ejendom"
      text: "Ejerne kan findes på flere måder. I det store korte, kan brugeren tænde for laget 'samlet fast ejendom' og derefter klikke på ejendommen. Det vil vise en popup med et link til ejendommen. Brugeren kan også fremsøge en adresse i søgefeltet, hvorved et link til ejendommen fidnes som detaljer på adresse/husnummer." 
      link1: "assets/docs/sfe.png"      
      link2: "assets/docs/adresse_sfe.png"      
    - title: "Hvad gælder for ?"
      id: 2
      description: "Vejledning i hvordan man finder hvad, der gælder for en geometri"
      text: "Hvad glæder kan foretages på flere måder. I det store korte, kan brugeren tegne en polygon eller udpege et punkt på kortet, hvorefter der vises en popup med et link til hvad der gælder for geometrien. Brugeren kan også klikke på et objekt i kortet og se detaljer for objektet. Brugeren kanogså fremsøge et objekt i søgefeltet og se detaljer og hvad gælder for objektet i form af indhold på fanerne." 
      link1: "assets/docs/hgf.png"      
      link2: "assets/docs/hgf2.png"    