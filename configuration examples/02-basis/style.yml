        controls:
        - layerswitch2:
            groups:
            - title: Park
              hideOpacityOption: true
              type: checkbox
              selectAll: false
              expanded: false
              showCount: true
              layers:
              - arbejdsomraader
            - title: Plansystem
              type: checkbox
              selectAll: false
              expanded: true
              showCount: true
              layers:
               - plansystem_vedtagetlokalplan
               - plansystem_kommuneplanramme
            - title: Matrikel
              type: checkbox
              selectAll: false
              expanded: true
              showCount: true
              layers:
               - Kortforsyningen_matrikelnumre
               - DAF_sfe
            - title: Offentlig transport
              type: checkbox
              selectAll: false
              expanded: true
              showCount: true
              layers:
              - s-train
              - metro
              - tog
              - bus
              - letbane
            - title: Sundhed
              hideOpacityOption: true
              type: checkbox
              selectAll: false
              expanded: false
              showCount: true
              layers:
              - apotek
              - medic
              - hospital
            - title: Indkøb
              type: checkbox
              selectAll: false
              expanded: false
              showCount: true
              layers:
              - supermarked
              - kiosk
              - shopping
              - tankstation
            - title: Seværdigheder
              type: checkbox
              selectAll: false
              expanded: false
              showCount: true
              layers:
              - museum
              - kulturhus_spillested
            - title: Sport / Idræt
              type: checkbox
              selectAll: false
              expanded: false
              showCount: true
              layers:
              - swim
              - fitness
              - tennis
              - football
              - golf      
        - print:
            buttonIndex: 8
            filename: kort.pdf
            popup: true
            popupTitle: Udskriv kort
            popupSubTitle: Vælg kortudsnit ved at flytte kortet
            popupButton: Udskriv
            fenceText: 'Kortudsnit, der kommer med på udskrift'
            formats:
              - name: A4
                value: a4
                selected: true
              - name: A3
                value: a3
            orientations: true
            scales:
              - name: '1:500'
                value: 500
              - name: '1:1000'
                value: 1000
              - name: '1:5000'
                value: 5000
        - fullextent:
            buttonIndex: 9
            disable: false
        - fullscreen:
            buttonIndex: 10
            disable: false
        - overviewmap:
            buttonIndex: 6
            showOnLoad: false
            position: "bottomright"
            disable: false
            activateButton:
              title: Vis oversigtskort
              className: bbb
            layer:
